; ──────────────────────────────────────────────────────────────────────────────
;  ChildUsageTracker — configuration file
;  Place this file in the same folder as ChildUsageTracker.exe
; ──────────────────────────────────────────────────────────────────────────────

[github]
; Personal Access Token with the "gist" scope
; Create one at: https://github.com/settings/tokens/new?scopes=gist
token=YOUR_GITHUB_PAT_HERE

; Filled automatically on first run — leave blank initially
gist_id=

[settings]
; Storage mode — set automatically on first run by the setup dialog.
; Values: gist  (sync to private GitHub Gist)
;         local (save to sessions.json next to the .exe only)
sync_mode=

; How often to scan running processes (seconds)
poll_interval_seconds=10

; How often to push the log to GitHub Gist (minutes)
sync_interval_minutes=5

[games]
; Format:  exe_filename=Display Name
; exe filename is case-insensitive
cs2.exe=Counter-Strike 2
ScooterFlow.exe=ScooterFlow
